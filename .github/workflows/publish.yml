name: Publish (npm)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.3.0). If empty, uses the release tag."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG_INPUT="${{ inputs.tag }}"
          if [ -n "$TAG_INPUT" ]; then
            echo "tag=$TAG_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify tag matches package version
        run: |
          node -e "const pkg=require('./package.json'); const tag='${{ steps.tag.outputs.tag }}'; const expected='v'+pkg.version; if(tag!==expected){ console.error(`Tag ${tag} does not match package.json version ${pkg.version} (expected ${expected})`); process.exit(1); }"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build && npm run build:cjs

      - name: Test
        run: npm test

      - name: Publish
        run: |
          npm publish --provenance --access public
